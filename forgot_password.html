<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps: Forgot Password</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/forgot_password.css">
</head>

<body>

    <div class="forgot-container">
        <div class="forgot-visual">
            <div class="visual-content">
                <img src="image/ChatGPT Image 5 มี.ค. 2569 22_12_29.png" alt="Skibidi Character"
                    class="floating-character">
                <h1>Skibidi Maps</h1>
                <p>ไม่ต้องกังวล เราจะช่วยคุณเอง!</p>
            </div>
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>

        <div class="forgot-form-side">
            <div class="form-wrapper">
                <h2 class="form-title">ลืมรหัสผ่าน?</h2>
                <p class="subtitle">กรอกอีเมลของคุณเพื่อรับรหัส OTP สำหรับตั้งรหัสผ่านใหม่</p>

                <form id="forgotForm">
                    <div class="input-group">
                        <label for="email">อีเมลของคุณ</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <button type="button" class="btn-send-otp" onclick="sendOTP()">ส่งรหัส OTP</button>
                </form>

                <p class="back-to-login">
                    <a href="login.html">← กลับไปหน้าเข้าสู่ระบบ</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function sendOTP() {
            const email = document.getElementById('email').value;
            if (email) {
                // จำลองการส่ง OTP และพาไปหน้าถัดไป (เช่นหน้ากรอก OTP)
                alert('ระบบได้ส่งรหัส OTP ไปที่ ' + email + ' แล้ว');
                // window.location.href = 'verify_otp.html';
            } else {
                alert('กรุณากรอกอีเมลของคุณ');
            }
        }
    </script>
</body>

</html>
