<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps</title>
    <link rel="stylesheet" href="style/style.css">

</head>

<body>
    <div class="profile-box">
        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="profile">
    </div>

    <div class="layout">

        <!-- ================= Sidebar ================= -->
        <aside class="sidebar">
            <div class="top-section">
                <div class="logo">
                    <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png"
                        alt="logo" class="logo-icon">

                    <span class="logo-text">Skibidi Maps</span>
                </div>

                <form class="search-box">
                    <input type="text" placeholder="Search location...">
                    <button type="submit" class="search-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
                            <path
                                d="M10 2a8 8 0 105.293 14.293l4.207 4.207 1.414-1.414-4.207-4.207A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z" />
                        </svg>
                    </button>
                </form>
            </div>

            <div class="menu">
                <div class="menu-item active">🏠 Home</div>
                <a href="add_pin.html" class="menu-item">➕ Add Pin</a>

                <div class="toilet-filter">
                    <div class="filter-title">Toilet Type</div>

                    <div class="toilet-options">
                        <div class="toilet-item">🚹</div>
                        <div class="toilet-item">🚺</div>
                        <div class="toilet-item">♿</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ================= MAP AREA ================= -->
        <main class="map-area">
            <a href="pin_info.html">pin_info link test</a>
            <div class="map-placeholder">
                MAP AREA
            </div>
        </main>
    </div>

    <div class="mobile-bottom-sheet">

        <div class="grab-header">
            <div class="grab-line"></div>
        </div>

        <div class="bottom-content">
            <form class="search-box">
                <input type="text" placeholder="Search location...">
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
                        <path
                            d="M10 2a8 8 0 105.293 14.293l4.207 4.207 1.414-1.414-4.207-4.207A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z" />
                    </svg>
                </button>
            </form>

            <div class="toilet-filter">
                <div class="filter-title">Toilet Type</div>

                <div class="toilet-options">
                    <div class="toilet-item">🚹</div>
                    <div class="toilet-item">🚺</div>
                    <div class="toilet-item">♿</div>
                </div>
            </div>

            <a href="add_pin.html" class="mobile-add">➕ Add Pin</a>
        </div>

    </div>

    <script>
        // ส่วนจัดการการเลือกประเภทห้องน้ำ (คงเดิม)
        const toiletItems = document.querySelectorAll(".toilet-item");

        toiletItems.forEach(item => {
            item.addEventListener("click", () => {
                item.classList.toggle("active");
            });
        });

        // ส่วนจัดการการลาก Mobile Bottom Sheet (ปรับปรุงให้รองรับมือถือ)
        const sheet = document.querySelector(".mobile-bottom-sheet");
        const grabHeader = document.querySelector(".grab-header");

        let isDragging = false;
        let startY = 0;
        let startBottom = 0;

        const MAX_BOTTOM = 0;
        const MIN_BOTTOM = -250;

        // ฟังก์ชันเริ่มต้นการลาก
        function startDrag(e) {
            isDragging = true;
            // ตรวจสอบว่าเป็น Touch (มือถือ) หรือ Mouse
            startY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            startBottom = parseInt(window.getComputedStyle(sheet).bottom) || 0;

            // ปิด transition ชั่วคราวเพื่อให้ลากแล้วขยับตามนิ้วทันที
            sheet.style.transition = "none";
        }

        // ฟังก์ชันขณะกำลังลาก
        function onDrag(e) {
            if (!isDragging) return;

            // ป้องกันหน้าจอหลักเลื่อนขณะลาก sheet บนมือถือ
            if (e.type === "touchmove") {
                // e.preventDefault(); // เปิดใช้ถ้าต้องการล็อคหน้าจอไม่ให้ขยับเลย
            }

            const currentY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
            const delta = startY - currentY;
            let newBottom = startBottom + delta;

            // จำกัดขอบเขตการลาก
            if (newBottom > MAX_BOTTOM) newBottom = MAX_BOTTOM;
            if (newBottom < MIN_BOTTOM) newBottom = MIN_BOTTOM;

            sheet.style.bottom = newBottom + "px";
        }

        // ฟังก์ชันหยุดลาก
        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;

            // ใส่ transition กลับคืนเพื่อให้ตอนปล่อยแล้วดูนุ่มนวล
            sheet.style.transition = "bottom 0.3s ease-out";
        }

        // --- ติดตั้ง Event Listeners ---

        // สำหรับเมาส์ (PC)
        grabHeader.addEventListener("mousedown", startDrag);
        document.addEventListener("mousemove", onDrag);
        document.addEventListener("mouseup", stopDrag);

        // สำหรับนิ้วสัมผัส (มือถือ)
        grabHeader.addEventListener("touchstart", startDrag, { passive: true });
        document.addEventListener("touchmove", onDrag, { passive: false });
        document.addEventListener("touchend", stopDrag); F
    </script>
</body>

</html>
