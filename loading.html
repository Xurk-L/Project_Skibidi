<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps: Loading</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/loading.css">
</head>

<body>
    <div class="loading-page">
        <div class="top-yellow-bar"></div>

        <div class="loading-content">
            <div class="spinner-container">
                <div class="loader"></div>
                <span class="loading-text">Loading ...</span>
            </div>

            <div class="character-container">
                <img src="image/ChatGPT Image 5 มี.ค. 2569 22_12_29.png" alt="Skibidi Character" class="floating-ani">
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. ดึงชื่อไฟล์ปลายทางจาก URL (ในที่นี้คือ index.html)
            const urlParams = new URLSearchParams(window.location.search);
            const targetPage = urlParams.get('target') || 'index.html';
            const loadingPage = document.querySelector('.loading-page');

            // 2. ตั้งเวลาจำลองการโหลด (เช่น 2.5 วินาที)
            setTimeout(() => {

                // 3. เริ่มเล่น Animation เลื่อนขึ้นด้านบน (Slide Out Up)
                if (loadingPage) {
                    loadingPage.classList.add('slide-out-up');
                }

                // 4. รอให้ Animation เล่นจบ (0.6 วินาที) แล้วค่อยเปลี่ยนหน้าจริง
                setTimeout(() => {
                    window.location.href = targetPage;
                }, 600);

            }, 1500);
        });
    </script>
</body>


</html>
