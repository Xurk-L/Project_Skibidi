<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps: Report</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/report.css">

</head>

<body>
    <div style="margin: 50px 40px;">
        <a style="text-decoration: none;" class="close-btn" onclick="history.back()">✕</a>
    </div>

    <div class="container">
        <div class="icon-wrapper">
            <img src="image/ChatGPT Image 5 มี.ค. 2569 22_12_29.png" alt="Skibidi Logo" class="main-icon">

            <div class="alert-badge">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
                    <path
                        d="M5 3 H19 Q22 3 22 6 V14 Q22 17 19 17 H11 Q10 17 9.5 18 Q8.5 20 6.8 20.8 Q6 21.2 6 20.3 V17 H5 Q2 17 2 14 V6 Q2 3 5 3 Z"
                        fill="#C62828" />
                    <path d="M12 7 Q12.8 7 13.2 7.8 L16.5 14 Q17 15 16 15 H8 Q7 15 7.5 14 L10.8 7.8 Q11.2 7 12 7 Z"
                        fill="white" />
                    <rect x="11.4" y="8.5" width="1.2" height="3.8" rx="0.6" fill="#C62828" />
                    <circle cx="12" cy="13.5" r="0.6" fill="#C62828" />
                </svg>
            </div>
        </div>

        <div class="container-content">
            <h1 style="margin-right: auto;">Report</h1>
            <div class="card">
                <div class="user-reviews">
                    <div class="profile">
                        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png"
                            alt="">
                    </div>
                    <span class="username">Username</span>
                </div>

                <hr color="#D9D9D9">
                <input type="text" placeholder="ห้องน้ำมีปัญหาอะไร? ...">
            </div>

            <div class="upload-section">
                <p class="upload-label">เพิ่มรูปภาพ <span>(ไม่บังคับ)</span></p>
                <div class="upload-container">
                    <label class="upload-box">
                        <input type="file" accept="image/*" hidden>
                        <div class="plus-icon">+</div>
                    </label>
                </div>
            </div>

            <button class="confirm-btn"">Confirm</button>
        </div>
    </div>

    <script>
    </script>

</body>

</html>
