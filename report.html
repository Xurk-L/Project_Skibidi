<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps: Report</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/report.css">

</head>

<body>
    <div style="margin: 50px 40px;">
        <a style="text-decoration: none;" class="close-btn" onclick="history.back()">✕</a>
    </div>

    <div class="container">
        <div class="icon"></div>

        <div class="container-content">
            <h1 style="margin-right: auto;">Report</h1>
            <div class="card">
                <div class="user-reviews">
                    <div class="profile">
                        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png"
                            alt="">
                    </div>
                    <span class="username">Username</span>
                </div>

                <hr color="#D9D9D9">
                <input type="text" placeholder="ห้องน้ำมีปัญหาอะไร? ...">
            </div>

            <div class="upload-section">
                <p class="upload-label">เพิ่มรูปภาพ <span>(ไม่บังคับ)</span></p>
                <div class="upload-container">
                    <label class="upload-box">
                        <input type="file" accept="image/*" hidden>
                        <div class="plus-icon">+</div>
                    </label>
                </div>
            </div>

            <button class="confirm-btn"">Confirm</button>
        </div>
    </div>

    <script>
    </script>

</body>

</html>
