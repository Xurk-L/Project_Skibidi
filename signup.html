<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Maps: Register</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/signup.css">
</head>

<body>

    <div class="login-container">
        <div class="login-visual">
            <div class="visual-content">
                <img src="image/ChatGPT Image 5 มี.ค. 2569 22_12_29.png" alt="Skibidi Character"
                    class="floating-character">
                <h1>Skibidi Maps</h1>
                <p>สร้างบัญชีเพื่อเข้าถึงฟีเจอร์ใหม่ๆ</p>
            </div>
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>

        <div class="login-form-side">
            <div class="form-wrapper">
                <h2 class="form-title">สร้างบัญชีใหม่</h2>
                <p class="subtitle">มาร่วมเป็นส่วนหนึ่งของคอมมูนิตี้ Skibidi</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="reg-username">ชื่อผู้ใช้งาน</label>
                        <input type="text" id="reg-username" placeholder="Enter your username">
                    </div>

                    <div class="input-group">
                        <label for="reg-email">อีเมล</label>
                        <input type="email" id="reg-email" placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <label for="reg-password">รหัสผ่าน</label>
                        <input type="password" id="reg-password" placeholder="Enter your password">
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">รหัสผ่าน</label>
                        <input type="password" id="confirm-password" placeholder="Confirm password">
                    </div>

                    <button type="button" class="btn-login">สมัครบัญชี</button>

                    <div class="divider">
                        <span>หรือสมัครด้วย</span>
                    </div>

                    <button type="button" class="btn-google">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                        Login with Google
                    </button>
                </form>

                <p class="register-text">
                    มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
